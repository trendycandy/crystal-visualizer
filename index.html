<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Crystallography Pro Simulator</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #master-container { display: flex; width: 100vw; height: 100vh; }
    
    .view-zone { 
      position: relative; height: 100%; border-right: 1px solid #333; 
      box-sizing: border-box; flex: 2; 
    }
    #gui-container { flex: 1; background: #111; overflow-y: auto; z-index: 20; }

    .view-label {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 4px 12px;
      border-radius: 4px; font-size: 11px; z-index: 10; pointer-events: none;
      white-space: nowrap; border: 1px solid #444;
    }

    #info-panel {
      position: absolute; top: 45px; left: 15px;
      background: rgba(255, 255, 255, 0.9); color: #000; padding: 8px 15px;
      border-radius: 6px; z-index: 15; pointer-events: none;
    }
  </style>
  <script type="module" crossorigin src="/crystal-visualizer/assets/index-lfg2lq6y.js"></script>
</head>
<body>
  <div id="info-panel">
    <div id="sg-name" style="font-size: 16px; font-weight: bold;">Loading...</div>
    <div id="sg-system" style="font-size: 11px; color: #666;">System</div>
  </div>

  <div id="master-container">
    <div id="view1" class="view-zone"><div class="view-label">1. Unit Cell</div></div>
    <div id="view2" class="view-zone"><div class="view-label">2. Experiment (Real Space)</div></div>
    <div id="view3" class="view-zone"><div class="view-label">3. Detector (Pattern)</div></div>
    <div id="gui-container"></div>
  </div>

</body>
</html>
